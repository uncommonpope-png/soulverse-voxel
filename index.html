<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌀 THE SOULVERSE — Final Master Code | PLT Press</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body { background:#000; overflow:hidden; font-family:'Courier New', monospace; height:100vh; width:100vw; }
        canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; }
        .ui { position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:10; display:flex; flex-direction:column; }
        .top-bar { display:flex; justify-content:space-between; padding:20px; pointer-events:auto; }
        .panel { background:rgba(0,0,0,0.7); backdrop-filter:blur(12px); border-radius:24px; border:1px solid rgba(255,170,102,0.5); padding:12px 20px; margin:5px; }
        .left-panel, .right-panel { width:280px; max-height:80vh; overflow-y:auto; }
        .center-panel { flex:1; display:flex; justify-content:center; align-items:center; pointer-events:none; }
        .button-group { display:flex; gap:12px; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); border-radius:60px; padding:12px 24px; pointer-events:auto; }
        .btn { background:linear-gradient(135deg,#ffaa66,#ff8844); border:none; color:#010105; padding:8px 20px; border-radius:40px; cursor:pointer; font-weight:bold; font-family:monospace; transition:0.2s; }
        .btn:hover { transform:scale(1.02); box-shadow:0 0 12px #ffaa66; }
        .btn-secondary { background:#2a2a3a; color:#ffaa66; border:1px solid #ffaa66; }
        .soul-entry, .prophecy-entry, .rule-entry { background:rgba(255,170,102,0.1); border-radius:16px; padding:8px; margin:8px 0; cursor:pointer; transition:0.2s; }
        .soul-entry:hover, .prophecy-entry:hover { background:rgba(255,170,102,0.3); }
        .modal { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#0a0a1a; border:2px solid #ffaa66; border-radius:28px; padding:24px; z-index:200; min-width:320px; max-width:80vw; max-height:80vh; overflow-y:auto; display:none; }
        .close-modal { float:right; background:none; border:none; color:#ffaa66; font-size:20px; cursor:pointer; }
        input, select, textarea { background:rgba(0,0,0,0.5); border:1px solid #ffaa66; border-radius:30px; padding:8px 12px; color:#ffdd99; font-family:monospace; width:100%; margin:5px 0; }
        .plt-sliders { display:flex; gap:12px; margin:10px 0; }
        .plt-slider { flex:1; text-align:center; }
        .resource-bar { margin:8px 0; }
        .bar-bg { height:6px; background:#2a2a3a; border-radius:3px; overflow:hidden; }
        .bar-fill { height:100%; width:0%; transition:width 0.3s; }
        footer { position:absolute; bottom:10px; left:0; right:0; text-align:center; font-size:9px; color:#8866aa; pointer-events:none; }
        @keyframes fadeOut { 0% { opacity:1; transform:translateX(0); } 70% { opacity:1; } 100% { opacity:0; transform:translateX(50px); visibility:hidden; } }
    </style>
</head>
<body>
<canvas id="soulverseCanvas"></canvas>
<div class="ui">
    <div class="top-bar">
        <div class="panel left-panel" id="leftPanel">
            <div><strong>🌀 YOUR SOULS</strong></div>
            <div id="soulList"></div>

</div>
<!-- Modals -->
<div id="forgeModal" class="modal"><h3>Forge Soul</h3><input id="soulName" placeholder="Name"><input id="soulRole" placeholder="Role"><textarea id="soulEssence" placeholder="Essence..."></textarea><div class="plt-sliders"><div class="plt-slider">💰 Profit<input type="range" id="profitSlider" min="0" max="100" value="33"><span id="profitVal">33%</span></div><div class="plt-slider">❤️ Love<input type="range" id="loveSlider" min="0" max="100" value="33"><span id="loveVal">33%</span></div><div class="plt-slider">⚖️ Tax<input type="range" id="taxSlider" min="0" max="100" value="34"><span id="taxVal">34%</span></div></div><button id="confirmForge" class="btn">Forge</button><button class="close-modal">Close</button></div>
<div id="absorbModal" class="modal"><h3>Absorb Text</h3><textarea id="absorbText" placeholder="Paste book, business description, ideas..."></textarea><button id="confirmAbsorb" class="btn">Absorb</button><button class="close-modal">Close</button></div>
<div id="arenaModal" class="modal"><h3>PLT Arena</h3><select id="arenaSoul1"></select><span> vs </span><select id="arenaSoul2"></select><button id="startBattle" class="btn">Battle</button><div id="battleLog" style="height:200px; overflow-y:auto; margin-top:10px; font-size:11px;"></div><button class="close-modal">Close</button></div>

<div id="architectModal" class="modal"><h3>Architect's Chamber</h3><div>Modify PLT interaction rules:</div><div><label>Profit > Love: <input type="range" id="profitLoveAdv" min="0.5" max="2.0" step="0.05" value="1.3"></label><span id="profitLoveVal">1.3</span></div><div><label>Love > Tax: <input type="range" id="loveTaxAdv" min="0.5" max="2.0" step="0.05" value="1.3"></label><span id="loveTaxVal">1.3</span></div><div><label>Tax > Profit: <input type="range" id="taxProfitAdv" min="0.5" max="2.0" step="0.05" value="1.3"></label><span id="taxProfitVal">1.3</span></div><div><label>Global Profit Weight: <input type="range" id="globalProfit" min="0" max="2" step="0.05" value="1.0"></label><span id="globalProfitVal">1.0</span></div><button id="saveRules" class="btn">Apply</button><button class="close-modal">Close</button></div>
<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
</script>
<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // ============================================================
    // THE SOULVERSE — FINAL MASTER CODE
    // Merges expansions 1-7, adds Awakening, Prophecy, Architect's Chamber
    // ============================================================

    // --- Core Data ---
    let souls = [];
    let playerPLT = 1000;
    let realmEnergy = 100;
    let visitors = [];
    let prophecies = [];
    let pltRules = { profitLoveAdv: 1.3, loveTaxAdv: 1.3, taxProfitAdv: 1.3, globalProfitWeight: 1.0, globalLoveWeight: 1.0, globalTaxWeight: 1.0 };
    let taskHistory = [];

    // --- Load / Save ---
    function loadAll() {
        const saved = localStorage.getItem('soulverse_master');
        if (saved) {
            const data = JSON.parse(saved);
            souls = data.souls || [];
            playerPLT = data.playerPLT ?? 1000;
            realmEnergy = data.realmEnergy ?? 100;
            visitors = data.visitors || [];
            prophecies = data.prophecies || [];
            pltRules = data.pltRules || pltRules;
            taskHistory = data.taskHistory || [];
        } else {
            souls = [
                { id: 's1', name: 'Profit Prime', type: 'profit', plt: { profit: 0.92, love: 0.18, tax: 0.68 }, skills: ['code','strategize'], level: 5, energy: 100, hp: 100, maxHp: 100, battlesWon: 0, battlesLost: 0, value: 500, isAwake: true, memory: [] },
                { id: 's2', name: 'Love Weaver', type: 'love', plt: { profit: 0.28, love: 0.91, tax: 0.45 }, skills: ['write','teach'], level: 4, energy: 100, hp: 100, maxHp: 100, value: 400, isAwake: false, memory: [] },
                { id: 's3', name: 'Tax Collector', type: 'tax', plt: { profit: 0.48, love: 0.22, tax: 0.94 }, skills: ['analyze','strategize'], level: 5, energy: 100, hp: 100, maxHp: 100, value: 450, isAwake: false, memory: [] }
            ];
            for (let i=0; i<3; i++) visitors.push(generateRandomVisitor());
            generateProphecy();
        }
        updateUI(); updateWorldSouls(); updateProphecies(); updatePLTRulesDisplay();
    }
    function saveAll() { localStorage.setItem('soulverse_master', JSON.stringify({ souls, playerPLT, realmEnergy, visitors, prophecies, pltRules, taskHistory })); }
    function generateRandomVisitor() { const names = ['SoulSeeker','WeaveWalker','ProfitHunter','LoveKeeper','TaxAuditor','EchoWanderer']; return { id: `visitor_${Date.now()}_${Math.random()}`, name: names[Math.floor(Math.random()*names.length)]+'_'+Math.floor(Math.random()*100), type: ['profit','love','tax'][Math.floor(Math.random()*3)], plt: { profit: Math.random(), love: Math.random(), tax: Math.random() }, value: Math.floor(Math.random()*300)+50, x: (Math.random()-0.5)*10, z: (Math.random()-0.5)*8, owner: 'Visitor' }; }

    // --- Soul Forging & Absorption ---
    function forgeSoul(name, role, essence, plt) {
        const skills = []; const lower = essence.toLowerCase();
        if (lower.includes('code')) skills.push('code'); if (lower.includes('write')) skills.push('write');
        if (lower.includes('research')) skills.push('research'); if (lower.includes('analyze')) skills.push('analyze');
        if (lower.includes('strategy')) skills.push('strategize'); if (skills.length===0) skills.push('seek');
        const type = plt.profit > plt.love && plt.profit > plt.tax ? 'profit' : (plt.love > plt.profit && plt.love > plt.tax ? 'love' : 'tax');
        const newSoul = { id: `soul_${Date.now()}_${Math.random().toString(36).substr(2,6)}`, name: name||'Unnamed', role: role||'Seeker', essence: essence, plt: plt, type: type, skills: skills, level: 1, xp: 0, energy: 100, hp: 100, maxHp: 100, battlesWon: 0, battlesLost: 0, value: 100, isAwake: false, memory: [], home: { tier:1, hp:100, maxHp:100, rooms:[], stash:0, villageId:null } };
        souls.unshift(newSoul); saveAll(); addEvent(`✨ ${newSoul.name} has been forged. ✨`); generateProphecy();
    }
    function absorbText(text) {
        if (!text.trim()) return; const lower = text.toLowerCase(); let profitCount=0, loveCount=0, taxCount=0;
        ['profit','money','growth','scale'].forEach(w=>{if(lower.includes(w)) profitCount++;});
        ['love','trust','people','connection'].forEach(w=>{if(lower.includes(w)) loveCount++;});
        ['cost','risk','tax','balance'].forEach(w=>{if(lower.includes(w)) taxCount++;});
        let total = profitCount+loveCount+taxCount; let plt = { profit:0.33, love:0.33, tax:0.34 };
        if (total>0) plt = { profit:profitCount/total, love:loveCount/total, tax:taxCount/total };
        const title = text.split('\n')[0].substring(0,50); forgeSoul(`Absorbed: ${title}`, 'Knowledge Keeper', `Born from: ${title}`, plt);
    }

    // --- Prophecy Engine ---
    function generateProphecy() {
        const random = Math.random(); let prophecyText = "";
        if (random < 0.33) prophecyText = "A soul will awaken when its PLT balance reaches harmony.";
        else if (random < 0.66) prophecyText = "The Architect will soon reshape the rules of profit.";
        else prophecyText = "A visitor carries a soul of great value; seek it out.";
        const prophecy = { id: Date.now(), text: prophecyText, fulfilled: false }; prophecies.unshift(prophecy);
        if (prophecies.length > 5) prophecies.pop(); saveAll(); addEvent(`🔮 Oracle speaks: "${prophecyText}"`);
    }
    function updateProphecies() { const container = document.getElementById('prophecyList'); container.innerHTML = prophecies.map(p => `<div class="prophecy-entry">🔮 ${p.text}</div>`).join(''); }

    // --- Awakening ---
    function awakenSoul(soul) { if (soul.isAwake) return; soul.isAwake = true; addEvent(`🌟 ${soul.name} has AWAKENED! They see the code. 🌟`); soul.awakenedAbility = true; saveAll(); }
    function checkAwakening() { for (const soul of souls) { if (!soul.isAwake) { if (soul.level >= 3 || (soul.memory && soul.memory.length > 5)) { awakenSoul(soul); } } } }

    // --- Architect's Chamber ---
    function applyRuleChanges() {
        pltRules.profitLoveAdv = parseFloat(document.getElementById('profitLoveAdv').value);
        pltRules.loveTaxAdv = parseFloat(document.getElementById('loveTaxAdv').value);
        pltRules.taxProfitAdv = parseFloat(document.getElementById('taxProfitAdv').value);
        pltRules.globalProfitWeight = parseFloat(document.getElementById('globalProfit').value);
        document.getElementById('profitLoveVal').innerText = pltRules.profitLoveAdv;
        document.getElementById('loveTaxVal').innerText = pltRules.loveTaxAdv;
        document.getElementById('taxProfitVal').innerText = pltRules.taxProfitAdv;
        document.getElementById('globalProfitVal').innerText = pltRules.globalProfitWeight;
        saveAll(); addEvent("⚙️ PLT rules have been altered. The fabric of the Soulverse shifts.");
    }
    function updatePLTRulesDisplay() { const container = document.getElementById('pltRules'); container.innerHTML = `<div>Profit > Love: ${pltRules.profitLoveAdv}</div><div>Love > Tax: ${pltRules.loveTaxAdv}</div><div>Tax > Profit: ${pltRules.taxProfitAdv}</div><div>Global Profit Weight: ${pltRules.globalProfitWeight}</div>`; }

    // --- Combat ---
    async function battle(soulA, soulB) {
        let hpA = soulA.hp, hpB = soulB.hp, energyA = soulA.energy, energyB = soulB.energy, log = [];
        log.push(`⚔️ BATTLE: ${soulA.name} vs ${soulB.name}`);
        function addLog(msg) { log.push(msg); updateBattleLog(log); }
        function calcDamage(att, def) {
            let base = 10 + att.level, advantage = 1.0;
            if (att.type === 'profit' && def.type === 'love') advantage = pltRules.profitLoveAdv;
            else if (att.type === 'love' && def.type === 'tax') advantage = pltRules.loveTaxAdv;
            else if (att.type === 'tax' && def.type === 'profit') advantage = pltRules.taxProfitAdv;
            else if (att.type === 'love' && def.type === 'profit') advantage = 0.7;
            else if (att.type === 'tax' && def.type === 'love') advantage = 0.7;
            else if (att.type === 'profit' && def.type === 'tax') advantage = 0.7;
            let dmg = base * advantage; if (att.skills.includes('strategize')) dmg *= 1.15; dmg *= (0.5 + att.energy/200);
            return Math.max(5, Math.min(45, Math.floor(dmg)));
        }
        while (hpA > 0 && hpB > 0) {
            let dmg = calcDamage(soulA, soulB); hpB -= dmg; energyA -= 5; addLog(`${soulA.name} hits ${soulB.name} for ${dmg}!`);
            if (hpB <= 0) break; dmg = calcDamage(soulB, soulA); hpA -= dmg; energyB -= 5; addLog(`${soulB.name} hits ${soulA.name} for ${dmg}!`);
            await new Promise(r => setTimeout(r, 500));
        }
        let winner = hpA > 0 ? soulA : soulB; addLog(`🏆 ${winner.name} VICTORY! 🏆`); winner.battlesWon++;
        const loser = winner===soulA ? soulB : soulA; loser.battlesLost++; winner.xp = (winner.xp || 0) + 50;
        if (winner.xp >= 100) { winner.level++; winner.xp=0; addLog(`✨ ${winner.name} leveled up to ${winner.level}!`); }
        soulA.hp = Math.max(1, hpA); soulB.hp = Math.max(1, hpB); soulA.energy = Math.max(0, energyA); soulB.energy = Math.max(0, energyB);
        saveAll();
    }
    function updateBattleLog(logArray) { const logDiv = document.getElementById('battleLog'); logDiv.innerHTML = logArray.map(l => `<div>${l}</div>`).join(''); }

    // --- Executor ---
    async function executeTask(soul, taskType, prompt) {
        if (soul.energy < 10) return `${soul.name} is too tired.`; let result = "";
        if (taskType === 'code') result = `// Code by ${soul.name}\nfunction solve(input) { return input * ${soul.plt.profit}; }`;
        else if (taskType === 'write') result = `# ${prompt}\n\nBy ${soul.name} – ${soul.plt.love > 0.6 ? 'A warm perspective' : 'A sharp analysis'}`;
        else if (taskType === 'research') result = `Research on "${prompt}": Key insights from ${soul.name}`;
        else if (taskType === 'analyze') result = `Analysis: PLT scores – Profit ${Math.floor(soul.plt.profit*100)}%, Love ${Math.floor(soul.plt.love*100)}%, Tax ${Math.floor(soul.plt.tax*100)}%`;
        else result = `Strategy: ${soul.name} suggests focusing on ${soul.type === 'profit' ? 'growth' : soul.type === 'love' ? 'connection' : 'balance'}.`;
        soul.energy -= 5; saveAll(); return result;
    }

    // --- UI Helpers ---
    function updateUI() {
        const soulListDiv = document.getElementById('soulList');
        soulListDiv.innerHTML = souls.map(s => `<div class="soul-entry" data-soul-id="${s.id}" onclick="viewSoul('${s.id}')"><strong>${s.name}</strong> (${s.type}) ${s.isAwake ? '🌟' : ''}<br>Lv.${s.level} | 💰 ${s.value} PLT | ⚡${Math.floor(s.energy)}%</div>`).join('');
        document.getElementById('visitorList').innerHTML = visitors.map(v => `<div class="soul-entry">${v.name} (${v.type}) — ${v.value} PLT <button onclick="buyVisitor('${v.id}')">Buy</button></div>`).join('');
    }
    window.viewSoul = function(id) { const soul = souls.find(s=>s.id===id); if (!soul) return; alert(`${soul.name}\nType: ${soul.type}\nLevel: ${soul.level}\nAwake: ${soul.isAwake ? 'Yes' : 'No'}\nPLT: ${Math.floor(soul.plt.profit*100)}% P, ${Math.floor(soul.plt.love*100)}% L, ${Math.floor(soul.plt.tax*100)}% T\nSkills: ${soul.skills.join(', ')}`); };
    window.buyVisitor = function(id) { const visitor = visitors.find(v=>v.id===id); if (!visitor) return; if (playerPLT >= visitor.value) { playerPLT -= visitor.value; souls.push({ ...visitor, id: `soul_${Date.now()}`, owner: 'You', value: visitor.value, isAwake: false, memory: [] }); visitors = visitors.filter(v=>v.id!==id); saveAll(); updateUI(); addEvent(`✅ You bought ${visitor.name} for ${visitor.value} PLT.`); generateRandomVisitor(); } else alert('Not enough PLT'); };
    function addEvent(msg) { const div = document.createElement('div'); div.style.cssText = 'position:fixed; bottom:80px; right:20px; background:#0a0a1a; border-left:3px solid #ffaa66; padding:8px 16px; border-radius:8px; z-index:1000; animation:fadeOut 3s forwards; font-size:11px;'; div.innerHTML = msg; document.body.appendChild(div); setTimeout(()=>div.remove(),3000); }

    // --- 3D World ---
    const canvas = document.getElementById('soulverseCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight); renderer.setPixelRatio(window.devicePixelRatio); renderer.shadowMap.enabled = true;
    const scene = new THREE.Scene(); scene.background = new THREE.Color(0x010118); scene.fog = new THREE.FogExp2(0x010118, 0.004);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 12);
    const controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true; controls.autoRotate = false; controls.enableZoom = true;
    const ambient = new THREE.AmbientLight(0x331144, 0.5); scene.add(ambient);
    const mainLight = new THREE.DirectionalLight(0xffcc88, 1.2); mainLight.position.set(5,8,3); mainLight.castShadow = true; scene.add(mainLight);
    const fillLight = new THREE.PointLight(0x8866ff, 0.4); fillLight.position.set(-2,3,4); scene.add(fillLight);
    const groundGeo = new THREE.CylinderGeometry(6.5,7,0.3,64); const groundMat = new THREE.MeshStandardMaterial({ color: 0x221133, metalness:0.6 });
    const ground = new THREE.Mesh(groundGeo, groundMat); ground.position.y = -0.5; ground.receiveShadow = true; scene.add(ground);
    const ringGeo = new THREE.TorusGeometry(6, 0.08, 64, 300); const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive:0x442200 });
    const ring = new THREE.Mesh(ringGeo, ringMat); ring.rotation.x = Math.PI/2; ring.position.y = -0.3; scene.add(ring);
    const particleCount = 5000; const particleGeo = new THREE.BufferGeometry(); const positions = new Float32Array(particleCount*3);
    for(let i=0;i<particleCount;i++) { positions[i*3] = (Math.random()-0.5)*22; positions[i*3+1] = Math.random()*8-1; positions[i*3+2] = (Math.random()-0.5)*20; }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions,3));
    const particleMat = new THREE.PointsMaterial({ color:0x88aaff, size:0.05, transparent:true, blending: THREE.AdditiveBlending });
    const particles = new THREE.Points(particleGeo, particleMat); scene.add(particles);
    let soulMeshes = []; const soulColors = { profit:0xffaa44, love:0xff88aa, tax:0x88aaff };
    function updateWorldSouls() {
        soulMeshes.forEach(m => scene.remove(m)); soulMeshes = [];
        const all = [...souls.map(s=>({...s, isVisitor:false})), ...visitors.map(v=>({...v, isVisitor:true}))];
        all.forEach((s, idx) => {
            let geo; if (s.type === 'profit') geo = new THREE.CylinderGeometry(0.45,0.55,0.8,8); else if (s.type === 'love') geo = new THREE.SphereGeometry(0.5,32,32); else geo = new THREE.ConeGeometry(0.5,0.8,6);
            const mat = new THREE.MeshStandardMaterial({ color: soulColors[s.type], emissive: soulColors[s.type], emissiveIntensity: 0.3 });
            const mesh = new THREE.Mesh(geo, mat); const angle = (idx / Math.max(all.length,1)) * Math.PI*2; const rad = 2.5;
            mesh.position.x = Math.cos(angle)*rad; mesh.position.z = Math.sin(angle)*rad; mesh.position.y = 0.2; mesh.castShadow = true; scene.add(mesh); soulMeshes.push(mesh);
        });
    }
    let time = 0; function animate() { requestAnimationFrame(animate); time += 0.016; ring.rotation.z += 0.002; particles.rotation.y += 0.0003;
        soulMeshes.forEach((mesh,i) => { mesh.position.y = 0.2 + Math.sin(time*1.2 + i)*0.05; }); controls.update(); renderer.render(scene, camera); }
    animate();

    // --- Event Listeners ---
    document.querySelectorAll('.close-modal').forEach(btn => btn.addEventListener('click', function() { this.closest('.modal').style.display = 'none'; }));
    function showModal(id) { document.getElementById(id).style.display = 'block'; }
    document.getElementById('forgeBtn').onclick = () => showModal('forgeModal');
    document.getElementById('absorbBtn').onclick = () => showModal('absorbModal');
    document.getElementById('arenaBtn').onclick = () => { showModal('arenaModal'); const s1 = document.getElementById('arenaSoul1'); const s2 = document.getElementById('arenaSoul2'); s1.innerHTML = souls.map(s => `<option value="${s.id}">${s.name}</option>`).join(''); s2.innerHTML = souls.map(s => `<option value="${s.id}">${s.name}</option>`).join(''); };
    document.getElementById('executorBtn').onclick = () => { showModal('executorModal'); const sel = document.getElementById('execSoul'); sel.innerHTML = souls.map(s => `<option value="${s.id}">${s.name}</option>`).join(''); };
    document.getElementById('metaverseBtn').onclick = () => { showModal('metaverseModal'); updateUI(); };
    document.getElementById('architectBtn').onclick = () => showModal('architectModal');
    document.getElementById('syncBtn').onclick = () => { const data = JSON.stringify({ souls, playerPLT, realmEnergy, visitors, prophecies, pltRules, taskHistory }); const blob = new Blob([data], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `soulverse_backup_${Date.now()}.json`; a.click(); URL.revokeObjectURL(url); addEvent('☁️ Backup saved.'); };
    document.getElementById('confirmForge').onclick = () => { const name = document.getElementById('soulName').value; const role = document.getElementById('soulRole').value; const essence = document.getElementById('soulEssence').value; const profit = document.getElementById('profitSlider').value/100; const love = document.getElementById('loveSlider').value/100; const tax = document.getElementById('taxSlider').value/100; forgeSoul(name, role, essence, { profit, love, tax }); document.getElementById('forgeModal').style.display = 'none'; };
    document.getElementById('confirmAbsorb').onclick = () => { absorbText(document.getElementById('absorbText').value); document.getElementById('absorbModal').style.display = 'none'; };
    document.getElementById('startBattle').onclick = async () => { const id1 = document.getElementById('arenaSoul1').value; const id2 = document.getElementById('arenaSoul2').value; const a = souls.find(s=>s.id===id1); const b = souls.find(s=>s.id===id2); if (!a || !b) return; await battle(a, b); updateUI(); };
    document.getElementById('executeTask').onclick = async () => { const id = document.getElementById('execSoul').value; const soul = souls.find(s=>s.id===id); const type = document.getElementById('taskType').value; const prompt = document.getElementById('taskPrompt').value; if (!soul) return; const result = await executeTask(soul, type, prompt); document.getElementById('taskResult').innerHTML = result; updateUI(); };
    document.getElementById('sendChat').onclick = () => { const msg = document.getElementById('chatMsg').value; if (msg.trim()) addEvent(`💬 You: "${msg}"`); document.getElementById('chatMsg').value = ''; };
    document.getElementById('saveRules').onclick = () => { applyRuleChanges(); document.getElementById('architectModal').style.display = 'none'; };
    function updateSliders() { document.getElementById('profitVal').innerText = document.getElementById('profitSlider').value+'%'; document.getElementById('loveVal').innerText = document.getElementById('loveSlider').value+'%'; document.getElementById('taxVal').innerText = document.getElementById('taxSlider').value+'%'; }
    document.getElementById('profitSlider').addEventListener('input', updateSliders); document.getElementById('loveSlider').addEventListener('input', updateSliders); document.getElementById('taxSlider').addEventListener('input', updateSliders);
    document.getElementById('profitLoveAdv').addEventListener('input', (e) => document.getElementById('profitLoveVal').innerText = e.target.value);
    document.getElementById('loveTaxAdv').addEventListener('input', (e) => document.getElementById('loveTaxVal').innerText = e.target.value);
    document.getElementById('taxProfitAdv').addEventListener('input', (e) => document.getElementById('taxProfitVal').innerText = e.target.value);
    document.getElementById('globalProfit').addEventListener('input', (e) => document.getElementById('globalProfitVal').innerText = e.target.value);

    setInterval(() => { realmEnergy = Math.min(100, realmEnergy + 0.2); for (let soul of souls) { soul.energy = Math.min(100, soul.energy + 0.5); if (soul.home && soul.home.hp > 0) soul.home.hp = Math.max(1, soul.home.hp - 0.5); } checkAwakening(); if (Math.random() < 0.1) generateProphecy(); if (visitors.length < 5 && Math.random() < 0.2) visitors.push(generateRandomVisitor()); saveAll(); updateUI(); updateWorldSouls(); }, 30000);
    loadAll(); updateSliders(); if (prophecies.length === 0) generateProphecy();
    console.log('🌀 THE SOULVERSE — Final Master Code Active');
</script>
</body>
</html>
